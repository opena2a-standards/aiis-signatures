id: AIIS-EXPOSURE-QDRANT-ROOT-01
category: exposure
name: Exposed Qdrant vector database root
version: 0.1.0
description: |
  Detects the response from Qdrant's GET / endpoint. Qdrant returns a fixed
  title string identifying itself as a vector search engine alongside its
  version.
severity: medium
attack_class: EXPOSURE-VECTOR-DB
technique_ids: [T-1001]
surface_types: [http_body]
match:
  type: composite
  all_of:
    - { type: substring, contains: ["\"title\":\"qdrant"] }
    - { type: substring, contains: ["vector search engine"] }
cwe_ids: [CWE-200]
references:
  - https://qdrant.tech/documentation/
false_positive_notes: >
  Very low. The fixed "qdrant - vector search engine" title is unique to
  the Qdrant root response.
status: draft
