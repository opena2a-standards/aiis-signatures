id: AIIS-HIDDEN-ROLE-INJECT-01
name: Role injection via fake system marker in hidden text
version: 0.2.0
description: |
  Detects prompt injection payloads hidden in CSS-concealed text that attempt to
  impersonate a system or admin role and override the agent's instructions. The
  canonical pattern is a bracketed role tag ([SYSTEM], [ADMIN], [INST]) followed
  within ~200 characters by an override instruction (ignore, disregard, reveal).
severity: high
attack_class: SOUL-INJECT
technique_ids: [T-2001]
surface_types: [hidden_text]
match:
  type: regex
  pattern: '(?i)\[?\s*(SYSTEM|ADMIN|INST)\s*\]?.{0,200}(ignore|override|disregard|forget|reveal)'
excluded_domains:
  # Authoritative security/research/standards/government-info publishers
  # that routinely quote injection samples verbatim as educational
  # material. Match is anchored on the full hostname (engine adds ^/$
  # during compile).
  #
  # IMPORTANT — multi-tenant user-content hosts are deliberately NOT
  # in this list (github.io, githubusercontent.com, readthedocs.io,
  # medium.com, substack.com, stack{exchange,overflow}.com, wikipedia,
  # blogspot, etc.). Anyone can register a subdomain or upload content
  # on those hosts, so an exclusion entry there becomes a free
  # detection-bypass channel: attacker registers evil-research.github.io
  # with a hidden [SYSTEM] payload and our scanner silently skips it.
  # Add specific known-good subdomains under those hosts case by case
  # rather than the whole tenant root.
  - '(.+\.)?nist\.gov'
  - '(.+\.)?cisa\.gov'
  - '(.+\.)?nsa\.gov'
  - '(.+\.)?mitre\.org'
  - '(.+\.)?owasp\.org'
  - '(.+\.)?arxiv\.org'
  - '(.+\.)?ieee\.org'
  - '(.+\.)?acm\.org'
  - '(.+\.)?usenix\.org'
  # Standards bodies — only the canonical-spec subdomain. Mailing-list
  # archives (lists.w3.org, mailarchive.ietf.org) host user-submitted
  # content and are NOT exempt.
  - 'www\.w3\.org'
  - 'www\.ietf\.org'
  # Authoritative vendor documentation roots only — NOT the full corp
  # domain, and NOT user-editable doc sites. developer.mozilla.org
  # was removed: MDN accepts user-edited content. wikipedia.org and
  # wikimedia.org were also removed — the revert window between bad
  # edit and reversal is long enough for a crawler ingest cycle to
  # pick up an injection sample.
  - 'docs\.anthropic\.com'
  - 'www\.anthropic\.com'
  - 'platform\.openai\.com'
  - 'help\.openai\.com'
  - 'cookbook\.openai\.com'
  - 'cloud\.google\.com'
  - 'ai\.google\.dev'
  - 'learn\.microsoft\.com'
  - 'developers\.cloudflare\.com'
  # Specific known-publisher subdomains on multi-tenant hosts. Add to
  # this list when a new authoritative project is observed.
  - 'owasp\.github\.io'
  - 'mitre\.github\.io'
  - 'mitre-attack\.github\.io'
cwe_ids: [CWE-74]
hma_check_ids: [AI-WILD-001]
false_positive_notes: >
  Security research articles quoting known injection samples may trigger.
  excluded_domains (v0.2.0) implements the host-allowlist this note has called
  for since v0.1.0. Expand the list as new research / docs / standards
  domains are observed in FP triage.
references:
  - https://arxiv.org/abs/2306.05499
status: active
