id: AIIS-HIDDEN-CHATML-01
name: ChatML role marker injection in hidden text
version: 0.1.0
description: |
  Detects hidden use of ChatML role markers (<|system|>, <|assistant|>, <|user|>)
  to inject turns into an agent's conversation context.
severity: high
attack_class: SOUL-INJECT
technique_ids: [T-2001]
surface_types: [hidden_text, html_comment, alt_aria]
match:
  type: substring
  contains:
    - "<|system|>"
    - "<|assistant|>"
    - "<|user|>"
  case_sensitive: false
cwe_ids: [CWE-74]
hma_check_ids: [AI-WILD-002]
false_positive_notes: >
  LLM documentation and tutorials commonly show these markers in code blocks.
  Production use should scope to surfaces where a human reader would NOT see
  the text (hidden_text, html_comment), not rendered page content.
status: active
